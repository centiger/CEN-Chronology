<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
  <meta name="theme-color" content="#4b3324">
  <title>성경연대기</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button id="backBtn" class="iconbtn" aria-label="뒤로가기">‹</button>
      <div class="brand">
        <div id="headTitle" class="head-title">성경연대기</div>
        <div id="headSub" class="head-sub">창조와 원역사 · 족장 시대 · 출애굽과 광야</div>
      </div>
      <button id="homeBtn" class="iconbtn" aria-label="홈">⌂</button>
    </header>

    <main>
      <section id="home" class="page active">
        <div class="hero">
          <div class="eyebrow">CEN BIBLE TIMELINE</div>
          <h1>성경연대기</h1>
          <p>시대 흐름을 따라 핵심사건을 보고, 사건별 원본 인포그래픽을 바로 확인하는 독립 PWA입니다.</p>
        </div>
        <div class="stats">
          <div><b id="eraCount">3</b><span>시대</span></div>
          <div><b id="eventCount">23</b><span>핵심사건</span></div>
          <div><b>독립</b><span>PWA</span></div>
        </div>
        <div class="card">
          <h2>시대별 메뉴</h2>
          <div id="eraMenu" class="era-menu"></div>
        </div>
        <div class="card guide">
          <h2>사용 방식</h2>
          <p>① 시대 선택 → ② 사건 선택 → ③ 요약·핵심의미 확인 → ④ 원본 인포그래픽 보기</p>
        </div>
      </section>

      <section id="timeline" class="page">
        <div class="search-wrap">
          <input id="searchInput" class="search" placeholder="사건 검색: 유월절, 요셉, 홍해, 성막">
        </div>
        <div id="timelineRoot" class="timeline"></div>
      </section>

      <section id="detail" class="page">
        <div id="detailRoot"></div>
      </section>
    </main>

    <nav class="bottomnav">
      <button class="nav active" data-page="home"><span>⌂</span>홈</button>
      <button class="nav" data-page="timeline"><span>⌛</span>연대기</button>
      <button class="nav" data-event="creation"><span>✦</span>창조</button>
      <button class="nav" data-event="moses-birth"><span>⌁</span>출애굽</button>
    </nav>
  </div>

  <div id="viewer" class="viewer" aria-hidden="true">
    <div class="viewerbar">
      <button id="viewerClose">닫기</button>
      <div id="viewerTitle">원본 인포그래픽</div>
      <div class="zoomBtns"><button id="zoomOut">－</button><button id="zoomIn">＋</button></div>
    </div>
    <div id="viewerBody" class="viewerbody"><img id="viewerImg" alt="원본 인포그래픽"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
